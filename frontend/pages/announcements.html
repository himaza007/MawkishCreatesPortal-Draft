<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Announcements — Mawkish Creates Portal</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="topbar">
      <div class="page-title">Announcements</div>
      <div class="topbar-right">
        <button id="newAnnBtn" class="btn btn-primary btn-sm" onclick="openModal('annModal')" style="display:none">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:14px;height:14px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New Announcement
        </button>
      </div>
    </header>
    <main class="page-content">
      <div style="max-width:800px">
        <div class="filters-bar">
          <button class="filter-btn active" onclick="setAnnFilter('all',this)">All</button>
          <button class="filter-btn" onclick="setAnnFilter('high',this)">High Priority</button>
          <button class="filter-btn" onclick="setAnnFilter('pinned',this)">Pinned</button>
        </div>
        <div id="annList"></div>
      </div>
    </main>
  </div>
</div>

<!-- Ann Modal -->
<div class="modal-overlay" id="annModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">New Announcement</div>
      <button class="modal-close" onclick="closeModal('annModal')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Title *</label>
        <input type="text" id="annTitle" class="form-control" placeholder="Announcement headline">
      </div>
      <div class="form-group">
        <label class="form-label">Content *</label>
        <textarea id="annContent" class="form-control" rows="4" placeholder="Write your announcement…" style="resize:vertical"></textarea>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
        <div class="form-group">
          <label class="form-label">Priority</label>
          <select id="annPriority" class="form-control">
            <option value="high">High</option>
            <option value="medium">Medium</option>
            <option value="low">Low</option>
          </select>
        </div>
        <div class="form-group" style="display:flex;align-items:center;gap:10px;padding-top:22px">
          <input type="checkbox" id="annPinned" style="width:16px;height:16px;accent-color:var(--purple-600)">
          <label for="annPinned" style="font-size:0.83rem;font-weight:500;color:var(--grey-800);cursor:pointer">Pin this announcement</label>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('annModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveAnn()">Post Announcement</button>
    </div>
  </div>
</div>

<script src="/js/shell.js"></script>
<script>
  let allAnn = [];
  let annFilter = 'all';

  async function loadAnn() {
    await initShell('announcements');
    if (canEdit()) document.getElementById('newAnnBtn').style.display = '';
    const res = await fetch('/api/announcements', { credentials: 'include' });
    allAnn = await res.json();
    renderAnn();
  }

  function setAnnFilter(f, el) {
    annFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    renderAnn();
  }

  function renderAnn() {
    const el = document.getElementById('annList');
    let list = allAnn;
    if (annFilter === 'high') list = allAnn.filter(a => a.priority === 'high');
    if (annFilter === 'pinned') list = allAnn.filter(a => a.pinned);
    if (!list.length) { el.innerHTML = `<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:40px;height:40px"><path d="M22 17H2a3 3 0 000 6h12a3 3 0 003-3v-1"/></svg><p>No announcements</p></div>`; return; }
    el.innerHTML = list.map(a => `
      <div class="announcement-card ${a.pinned?'pinned':''}">
        <div class="ann-header">
          <div style="display:flex;align-items:center;gap:8px">
            ${a.pinned?`<svg viewBox="0 0 24 24" fill="#c9a84c" stroke="#c9a84c" stroke-width="1.5" style="width:14px;height:14px;flex-shrink:0"><path d="M15 3l6 6-1 1-6-6 1-1zm-9.5 9.5L12 18l-1.5 3-3-3-6.5 1 1-6.5zM12 12l-1.5-1.5"/></svg>`:''}
            <div class="ann-title">${a.title}</div>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <span class="status-badge ${a.priority==='high'?'priority-high':a.priority==='medium'?'priority-medium':'priority-low'}">${a.priority}</span>
            ${canEdit() ? `<button class="btn btn-danger btn-sm btn-icon" onclick="deleteAnn('${a._id}')">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:13px;height:13px"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>
            </button>` : ''}
          </div>
        </div>
        <div class="ann-content">${a.content}</div>
        <div class="ann-meta">Posted by ${a.author} · ${formatDate(a.createdAt)}</div>
      </div>
    `).join('');
  }

  async function saveAnn() {
    const title = document.getElementById('annTitle').value.trim();
    const content = document.getElementById('annContent').value.trim();
    if (!title || !content) { showToast('Title and content are required', 'error'); return; }
    const payload = { title, content, priority: document.getElementById('annPriority').value, pinned: document.getElementById('annPinned').checked };
    const res = await fetch('/api/announcements', { method: 'POST', headers: { 'Content-Type': 'application/json' }, credentials: 'include', body: JSON.stringify(payload) });
    if (!res.ok) { showToast('Failed to post', 'error'); return; }
    const fresh = await fetch('/api/announcements', { credentials: 'include' });
    allAnn = await fresh.json();
    renderAnn();
    closeModal('annModal');
    ['annTitle','annContent'].forEach(id => document.getElementById(id).value='');
    document.getElementById('annPinned').checked = false;
    showToast('Announcement posted', 'success');
  }

  async function deleteAnn(id) {
    if (!confirm('Delete this announcement?')) return;
    await fetch(`/api/announcements/${id}`, { method: 'DELETE', credentials: 'include' });
    allAnn = allAnn.filter(a => a._id !== id);
    renderAnn();
    showToast('Deleted');
  }

  loadAnn();
</script>
</body>
</html>
