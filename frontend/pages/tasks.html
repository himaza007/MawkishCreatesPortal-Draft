<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tasks — Mawkish Creates Portal</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="topbar">
      <div class="page-title">Tasks</div>
      <div class="topbar-right">
        <button class="btn btn-primary btn-sm" onclick="openModal('taskModal')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New Task
        </button>
      </div>
    </header>
    <main class="page-content">

      <!-- Filters -->
      <div class="filters-bar">
        <div class="search-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" class="search-input" id="taskSearch" placeholder="Search tasks…" oninput="renderTasks()">
        </div>
        <button class="filter-btn active" data-filter="all" onclick="setFilter('all',this)">All</button>
        <button class="filter-btn" data-filter="pending" onclick="setFilter('pending',this)">Pending</button>
        <button class="filter-btn" data-filter="in-progress" onclick="setFilter('in-progress',this)">In Progress</button>
        <button class="filter-btn" data-filter="completed" onclick="setFilter('completed',this)">Completed</button>
      </div>

      <!-- Columns -->
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:18px">
        <div>
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
            <div style="width:10px;height:10px;border-radius:50%;background:#f59e0b"></div>
            <span style="font-size:0.8rem;font-weight:600;color:var(--grey-600);text-transform:uppercase;letter-spacing:0.06em">Pending</span>
            <span id="countPending" style="font-size:0.72rem;background:var(--grey-200);border-radius:10px;padding:1px 8px;color:var(--grey-600)">0</span>
          </div>
          <div id="colPending"></div>
        </div>
        <div>
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
            <div style="width:10px;height:10px;border-radius:50%;background:#3b82f6"></div>
            <span style="font-size:0.8rem;font-weight:600;color:var(--grey-600);text-transform:uppercase;letter-spacing:0.06em">In Progress</span>
            <span id="countProgress" style="font-size:0.72rem;background:var(--grey-200);border-radius:10px;padding:1px 8px;color:var(--grey-600)">0</span>
          </div>
          <div id="colProgress"></div>
        </div>
        <div>
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
            <div style="width:10px;height:10px;border-radius:50%;background:#10b981"></div>
            <span style="font-size:0.8rem;font-weight:600;color:var(--grey-600);text-transform:uppercase;letter-spacing:0.06em">Completed</span>
            <span id="countCompleted" style="font-size:0.72rem;background:var(--grey-200);border-radius:10px;padding:1px 8px;color:var(--grey-600)">0</span>
          </div>
          <div id="colCompleted"></div>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- Task Modal -->
<div class="modal-overlay" id="taskModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="taskModalTitle">New Task</div>
      <button class="modal-close" onclick="closeModal('taskModal')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="taskId">
      <div class="form-group">
        <label class="form-label">Task Title *</label>
        <input type="text" id="taskTitle" class="form-control" placeholder="What needs to be done?">
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea id="taskDesc" class="form-control" rows="3" placeholder="Add details…" style="resize:vertical"></textarea>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
        <div class="form-group">
          <label class="form-label">Status</label>
          <select id="taskStatus" class="form-control">
            <option value="pending">Pending</option>
            <option value="in-progress">In Progress</option>
            <option value="completed">Completed</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Priority</label>
          <select id="taskPriority" class="form-control">
            <option value="high">High</option>
            <option value="medium">Medium</option>
            <option value="low">Low</option>
          </select>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
        <div class="form-group">
          <label class="form-label">Assignee</label>
          <input type="text" id="taskAssignee" class="form-control" placeholder="Who's responsible?">
        </div>
        <div class="form-group">
          <label class="form-label">Due Date</label>
          <input type="date" id="taskDue" class="form-control">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('taskModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveTask()">Save Task</button>
    </div>
  </div>
</div>

<script src="/js/shell.js"></script>
<script>
  let allTasks = [];
  let currentFilter = 'all';

  async function loadTasks() {
    await initShell('tasks');
    const res = await fetch('/api/tasks', { credentials: 'include' });
    allTasks = await res.json();
    renderTasks();
  }

  function setFilter(f, el) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    renderTasks();
  }

  function renderTasks() {
    const q = document.getElementById('taskSearch').value.toLowerCase();
    let tasks = allTasks.filter(t => {
      const matchQ = !q || t.title.toLowerCase().includes(q) || (t.description||'').toLowerCase().includes(q);
      const matchF = currentFilter === 'all' || t.status === currentFilter;
      return matchQ && matchF;
    });

    ['pending','in-progress','completed'].forEach(s => {
      const col = document.getElementById(s==='in-progress'?'colProgress':s==='completed'?'colCompleted':'colPending');
      const count = document.getElementById(s==='in-progress'?'countProgress':s==='completed'?'countCompleted':'countPending');
      const filtered = tasks.filter(t => t.status === s);
      count.textContent = filtered.length;
      if (!filtered.length) {
        col.innerHTML = `<div style="padding:20px;text-align:center;font-size:0.78rem;color:var(--grey-400);background:var(--grey-100);border-radius:10px">No tasks</div>`;
        return;
      }
      col.innerHTML = filtered.map(t => `
        <div class="task-item" style="flex-direction:column;align-items:flex-start;gap:10px">
          <div style="display:flex;align-items:flex-start;gap:10px;width:100%">
            <div class="task-body">
              <div class="task-title">${t.title}</div>
              ${t.description ? `<div class="task-meta">${t.description.substring(0,80)}${t.description.length>80?'…':''}</div>` : ''}
            </div>
          </div>
          <div style="display:flex;align-items:center;justify-content:space-between;width:100%;flex-wrap:wrap;gap:6px">
            <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
              <span class="status-badge ${t.priority==='high'?'priority-high':t.priority==='medium'?'priority-medium':'priority-low'}">${t.priority}</span>
              ${t.assignee ? `<span style="font-size:0.72rem;color:var(--text-secondary)">${t.assignee}</span>` : ''}
              ${t.dueDate ? `<span style="font-size:0.72rem;color:var(--text-secondary)">Due ${formatDate(t.dueDate)}</span>` : ''}
            </div>
            <div class="task-actions" style="opacity:1;display:flex;gap:4px">
              <button class="btn btn-ghost btn-sm btn-icon" onclick="editTask('${t._id}')" title="Edit">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              </button>
              <button class="btn btn-danger btn-sm btn-icon" onclick="deleteTask('${t._id}')" title="Delete">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
              </button>
            </div>
          </div>
        </div>
      `).join('');
    });
  }

  function editTask(id) {
    const t = allTasks.find(x => x._id === id);
    if (!t) return;
    document.getElementById('taskId').value = t._id;
    document.getElementById('taskModalTitle').textContent = 'Edit Task';
    document.getElementById('taskTitle').value = t.title;
    document.getElementById('taskDesc').value = t.description || '';
    document.getElementById('taskStatus').value = t.status;
    document.getElementById('taskPriority').value = t.priority;
    document.getElementById('taskAssignee').value = t.assignee || '';
    document.getElementById('taskDue').value = t.dueDate || '';
    openModal('taskModal');
  }

  function resetTaskForm() {
    document.getElementById('taskId').value = '';
    document.getElementById('taskModalTitle').textContent = 'New Task';
    ['taskTitle','taskDesc','taskAssignee','taskDue'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('taskStatus').value = 'pending';
    document.getElementById('taskPriority').value = 'medium';
  }

  document.getElementById('taskModal').addEventListener('click', e => { if (e.target === e.currentTarget) { closeModal('taskModal'); resetTaskForm(); } });

  async function saveTask() {
    const id = document.getElementById('taskId').value;
    const title = document.getElementById('taskTitle').value.trim();
    if (!title) { showToast('Task title is required', 'error'); return; }
    const payload = {
      title, description: document.getElementById('taskDesc').value,
      status: document.getElementById('taskStatus').value,
      priority: document.getElementById('taskPriority').value,
      assignee: document.getElementById('taskAssignee').value,
      dueDate: document.getElementById('taskDue').value,
    };
    const url = id ? `/api/tasks/${id}` : '/api/tasks';
    const method = id ? 'PUT' : 'POST';
    const res = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, credentials: 'include', body: JSON.stringify(payload) });
    if (!res.ok) { showToast('Failed to save task', 'error'); return; }
    closeModal('taskModal');
    resetTaskForm();
    const updated = await fetch('/api/tasks', { credentials: 'include' });
    allTasks = await updated.json();
    renderTasks();
    showToast(id ? 'Task updated' : 'Task created', 'success');
  }

  async function deleteTask(id) {
    if (!confirm('Delete this task?')) return;
    await fetch(`/api/tasks/${id}`, { method: 'DELETE', credentials: 'include' });
    allTasks = allTasks.filter(t => t._id !== id);
    renderTasks();
    showToast('Task deleted');
  }

  loadTasks();
</script>
</body>
</html>
