<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resources — Mawkish Creates Portal</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="topbar">
      <div class="page-title">Resources</div>
      <div class="topbar-right">
        <button class="btn btn-primary btn-sm" onclick="openModal('resModal')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:14px;height:14px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Resource
        </button>
      </div>
    </header>
    <main class="page-content">

      <div class="filters-bar">
        <div class="search-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" class="search-input" id="resSearch" placeholder="Search resources…" oninput="renderResources()">
        </div>
        <button class="filter-btn active" onclick="setResFilter('all',this)">All</button>
        <button class="filter-btn" onclick="setResFilter('Brand',this)">Brand</button>
        <button class="filter-btn" onclick="setResFilter('Design',this)">Design</button>
        <button class="filter-btn" onclick="setResFilter('Operations',this)">Operations</button>
      </div>

      <div class="grid-auto" id="resourceGrid"></div>
    </main>
  </div>
</div>

<!-- Resource Modal -->
<div class="modal-overlay" id="resModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Add Resource</div>
      <button class="modal-close" onclick="closeModal('resModal')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Title *</label>
        <input type="text" id="resTitle" class="form-control" placeholder="Resource name">
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea id="resDesc" class="form-control" rows="2" placeholder="Brief description" style="resize:vertical"></textarea>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
        <div class="form-group">
          <label class="form-label">Category</label>
          <select id="resCat" class="form-control">
            <option value="Brand">Brand</option>
            <option value="Design">Design</option>
            <option value="Operations">Operations</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Type</label>
          <select id="resType" class="form-control">
            <option value="document">Document</option>
            <option value="tool">Tool</option>
            <option value="template">Template</option>
            <option value="media">Media</option>
            <option value="link">Link</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">URL / Link</label>
        <input type="text" id="resUrl" class="form-control" placeholder="https://…">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('resModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveResource()">Add Resource</button>
    </div>
  </div>
</div>

<script src="/js/shell.js"></script>
<script>
  let allRes = [];
  let resFilter = 'all';

  const TYPE_ICONS = {
    document: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>`,
    tool: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg>`,
    template: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>`,
    media: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>`,
    link: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>`,
  };

  async function loadResources() {
    await initShell('resources');
    const res = await fetch('/api/resources', { credentials: 'include' });
    allRes = await res.json();
    renderResources();
  }

  function setResFilter(f, el) {
    resFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    renderResources();
  }

  function renderResources() {
    const q = document.getElementById('resSearch').value.toLowerCase();
    let list = allRes.filter(r => {
      const matchQ = !q || r.title.toLowerCase().includes(q) || (r.description||'').toLowerCase().includes(q);
      const matchF = resFilter === 'all' || r.category === resFilter;
      return matchQ && matchF;
    });
    const grid = document.getElementById('resourceGrid');
    if (!list.length) { grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:48px;height:48px;color:var(--grey-400)"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg><h3>No resources found</h3></div>`; return; }
    grid.innerHTML = list.map(r => `
      <div class="resource-card">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">
          <div class="resource-icon">${TYPE_ICONS[r.type]||TYPE_ICONS.link}</div>
          <button class="btn btn-danger btn-sm btn-icon" onclick="deleteResource('${r._id}')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:12px;height:12px"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>
          </button>
        </div>
        <div>
          <div class="resource-title">${r.title}</div>
          ${r.description ? `<div class="resource-desc">${r.description}</div>` : ''}
        </div>
        <div class="resource-cat">
          <span class="tag">${r.category}</span>
          <span class="tag" style="background:var(--grey-100);color:var(--grey-600);border-color:var(--grey-200)">${r.type}</span>
        </div>
        ${r.url && r.url !== '#' ? `<a href="${r.url}" target="_blank" class="btn btn-secondary btn-sm" style="width:100%;justify-content:center;margin-top:4px">Open Resource</a>` : `<button class="btn btn-ghost btn-sm" style="width:100%;justify-content:center;margin-top:4px;cursor:default;opacity:0.6" disabled>No link added</button>`}
      </div>
    `).join('');
  }

  async function saveResource() {
    const title = document.getElementById('resTitle').value.trim();
    if (!title) { showToast('Title is required', 'error'); return; }
    const payload = { title, description: document.getElementById('resDesc').value, category: document.getElementById('resCat').value, type: document.getElementById('resType').value, url: document.getElementById('resUrl').value };
    await fetch('/api/resources', { method: 'POST', headers: { 'Content-Type': 'application/json' }, credentials: 'include', body: JSON.stringify(payload) });
    const fresh = await fetch('/api/resources', { credentials: 'include' });
    allRes = await fresh.json();
    renderResources();
    closeModal('resModal');
    ['resTitle','resDesc','resUrl'].forEach(id => document.getElementById(id).value='');
    showToast('Resource added', 'success');
  }

  async function deleteResource(id) {
    if (!confirm('Remove this resource?')) return;
    await fetch(`/api/resources/${id}`, { method: 'DELETE', credentials: 'include' });
    allRes = allRes.filter(r => r._id !== id);
    renderResources();
    showToast('Removed');
  }

  loadResources();
</script>
</body>
</html>
