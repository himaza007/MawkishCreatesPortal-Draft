<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pipelines — Mawkish Creates Portal</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="topbar">
      <div class="page-title">Client Pipelines</div>
      <div class="topbar-right">
        <button id="addClientBtn" class="btn btn-primary btn-sm" onclick="openModal('pipeModal')" style="display:none">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:14px;height:14px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Client
        </button>
      </div>
    </header>
    <main class="page-content">
      <!-- Demo image banner -->
      <div style="width:100%;height:160px;border-radius:16px;overflow:hidden;margin-bottom:24px;position:relative">
        <img src="https://images.unsplash.com/photo-1552664730-d307ca884978?w=1200&q=80" alt="Team" style="width:100%;height:100%;object-fit:cover;object-position:center 40%">
        <div style="position:absolute;inset:0;background:linear-gradient(to right,rgba(13,1,32,0.85),rgba(66,15,138,0.4));display:flex;align-items:center;padding:0 32px">
          <div>
            <div style="font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;color:#fff">Client Pipeline</div>
            <div style="font-size:0.83rem;color:rgba(219,200,253,0.75);margin-top:4px">Track every client from proposal to delivery</div>
          </div>
        </div>
      </div>

      <!-- Table view -->
      <div class="card">
        <div class="card-header" style="margin-bottom:0">
          <div class="card-title">All Clients</div>
          <div class="filters-bar" style="margin-bottom:0">
            <button class="filter-btn active" onclick="setPipeFilter('all',this)">All</button>
            <button class="filter-btn" onclick="setPipeFilter('Active',this)">Active</button>
            <button class="filter-btn" onclick="setPipeFilter('Onboarding',this)">Onboarding</button>
            <button class="filter-btn" onclick="setPipeFilter('Proposal',this)">Proposal</button>
            <button class="filter-btn" onclick="setPipeFilter('Completed',this)">Completed</button>
          </div>
        </div>
        <div style="margin-top:18px">
          <div class="table-wrap">
            <table id="pipeTable">
              <thead>
                <tr>
                  <th>Client</th>
                  <th>Stage</th>
                  <th>Service</th>
                  <th>Value</th>
                  <th>PM</th>
                  <th>Start Date</th>
                  <th>Status</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="pipeBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- Pipeline Modal -->
<div class="modal-overlay" id="pipeModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="pipeModalTitle">Add Client</div>
      <button class="modal-close" onclick="closeModal('pipeModal')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="pipeId">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
        <div class="form-group">
          <label class="form-label">Client Name *</label>
          <input type="text" id="pipeClient" class="form-control" placeholder="Client or company name">
        </div>
        <div class="form-group">
          <label class="form-label">Stage</label>
          <select id="pipeStage" class="form-control">
            <option value="Proposal">Proposal</option>
            <option value="Onboarding">Onboarding</option>
            <option value="Active">Active</option>
            <option value="Completed">Completed</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Service / Scope</label>
        <input type="text" id="pipeService" class="form-control" placeholder="e.g. Brand Identity + Social Media">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
        <div class="form-group">
          <label class="form-label">Value (LKR)</label>
          <input type="text" id="pipeValue" class="form-control" placeholder="e.g. LKR 250,000">
        </div>
        <div class="form-group">
          <label class="form-label">Project Manager</label>
          <input type="text" id="pipePM" class="form-control" placeholder="PM name">
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
        <div class="form-group">
          <label class="form-label">Start Date</label>
          <input type="date" id="pipeStart" class="form-control">
        </div>
        <div class="form-group">
          <label class="form-label">Status</label>
          <select id="pipeStatus" class="form-control">
            <option value="new">New</option>
            <option value="on-track">On Track</option>
            <option value="pending">At Risk</option>
            <option value="completed">Completed</option>
          </select>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('pipeModal')">Cancel</button>
      <button class="btn btn-primary" onclick="savePipe()">Save</button>
    </div>
  </div>
</div>

<script src="/js/shell.js"></script>
<script>
  let allPipes = [];
  let pipeFilter = 'all';

  async function loadPipelines() {
    await initShell('pipelines');
    if (canEdit()) document.getElementById('addClientBtn').style.display = '';
    const res = await fetch('/api/pipelines', { credentials: 'include' });
    allPipes = await res.json();
    renderPipes();
  }

  function setPipeFilter(f, el) {
    pipeFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    renderPipes();
  }

  function renderPipes() {
    const list = pipeFilter === 'all' ? allPipes : allPipes.filter(p => p.stage === pipeFilter);
    const body = document.getElementById('pipeBody');
    if (!list.length) { body.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:32px;color:var(--grey-400)">No clients in this stage</td></tr>`; return; }
    body.innerHTML = list.map(p => `
      <tr>
        <td><strong>${p.client}</strong></td>
        <td><span class="tag">${p.stage}</span></td>
        <td style="color:var(--text-secondary)">${p.service||'—'}</td>
        <td style="font-weight:600;color:var(--gold)">${p.value||'—'}</td>
        <td>${p.pm||'—'}</td>
        <td>${p.startDate ? formatDate(p.startDate+'T00:00') : '—'}</td>
        <td><span class="status-badge status-${p.status==='on-track'?'on-track':p.status==='new'?'new':p.status==='completed'?'completed':'pending'}">${p.status}</span></td>
        <td>
          ${canEdit() ? `<div style="display:flex;gap:4px">
            <button class="btn btn-ghost btn-sm btn-icon" onclick="editPipe('${p._id}')">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:13px;height:13px"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
            <button class="btn btn-danger btn-sm btn-icon" onclick="deletePipe('${p._id}')">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:13px;height:13px"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>
            </button>
          </div>` : ''}
        </td>
      </tr>
    `).join('');
  }

  function editPipe(id) {
    const p = allPipes.find(x => x._id === id);
    if (!p) return;
    document.getElementById('pipeId').value = p._id;
    document.getElementById('pipeModalTitle').textContent = 'Edit Client';
    document.getElementById('pipeClient').value = p.client;
    document.getElementById('pipeStage').value = p.stage;
    document.getElementById('pipeService').value = p.service||'';
    document.getElementById('pipeValue').value = p.value||'';
    document.getElementById('pipePM').value = p.pm||'';
    document.getElementById('pipeStart').value = p.startDate||'';
    document.getElementById('pipeStatus').value = p.status||'new';
    openModal('pipeModal');
  }

  async function savePipe() {
    const id = document.getElementById('pipeId').value;
    const client = document.getElementById('pipeClient').value.trim();
    if (!client) { showToast('Client name is required', 'error'); return; }
    const payload = { client, stage: document.getElementById('pipeStage').value, service: document.getElementById('pipeService').value, value: document.getElementById('pipeValue').value, pm: document.getElementById('pipePM').value, startDate: document.getElementById('pipeStart').value, status: document.getElementById('pipeStatus').value };
    const url = id ? `/api/pipelines/${id}` : '/api/pipelines';
    const method = id ? 'PUT' : 'POST';
    await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, credentials: 'include', body: JSON.stringify(payload) });
    const fresh = await fetch('/api/pipelines', { credentials: 'include' });
    allPipes = await fresh.json();
    renderPipes();
    closeModal('pipeModal');
    document.getElementById('pipeId').value='';
    showToast(id ? 'Updated' : 'Client added', 'success');
  }

  async function deletePipe(id) {
    if (!confirm('Remove this client?')) return;
    await fetch(`/api/pipelines/${id}`, { method: 'DELETE', credentials: 'include' });
    allPipes = allPipes.filter(p => p._id !== id);
    renderPipes();
    showToast('Removed');
  }

  loadPipelines();
</script>
</body>
</html>
