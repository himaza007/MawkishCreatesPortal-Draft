<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendar — Mawkish Creates Portal</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="topbar">
      <div class="page-title">Calendar</div>
      <div class="topbar-right">
        <button id="addEventBtn" class="btn btn-primary btn-sm" onclick="openModal('eventModal')" style="display:none">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:14px;height:14px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Event
        </button>
      </div>
    </header>
    <main class="page-content">
      <div class="grid-2" style="gap:24px;align-items:start">
        <!-- Calendar -->
        <div class="card" style="grid-column:1/2">
          <div class="card-header" style="margin-bottom:16px">
            <div class="card-title" id="calMonthLabel"></div>
            <div style="display:flex;gap:6px">
              <button class="btn btn-ghost btn-sm btn-icon" onclick="changeMonth(-1)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:15px;height:15px"><polyline points="15 18 9 12 15 6"/></svg>
              </button>
              <button class="btn btn-ghost btn-sm btn-icon" onclick="changeMonth(1)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:15px;height:15px"><polyline points="9 18 15 12 9 6"/></svg>
              </button>
            </div>
          </div>
          <div class="calendar-grid" id="calendarGrid"></div>
        </div>

        <!-- Events list -->
        <div>
          <div class="card" style="margin-bottom:16px">
            <div class="card-header" style="margin-bottom:12px">
              <div class="card-title">All Events</div>
            </div>
            <div id="eventsList"></div>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- Event Modal -->
<div class="modal-overlay" id="eventModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="eventModalTitle">New Event</div>
      <button class="modal-close" onclick="closeModal('eventModal')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="eventId">
      <div class="form-group">
        <label class="form-label">Event Title *</label>
        <input type="text" id="eventTitle" class="form-control" placeholder="e.g. Mawkish Creates | Client Onboarding">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
        <div class="form-group">
          <label class="form-label">Date *</label>
          <input type="date" id="eventDate" class="form-control">
        </div>
        <div class="form-group">
          <label class="form-label">Time</label>
          <input type="time" id="eventTime" class="form-control">
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
        <div class="form-group">
          <label class="form-label">Type</label>
          <select id="eventType" class="form-control">
            <option value="internal">Internal</option>
            <option value="client">Client</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Location</label>
          <input type="text" id="eventLocation" class="form-control" placeholder="e.g. Charles Place Office">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea id="eventDesc" class="form-control" rows="2" placeholder="Brief agenda or notes…" style="resize:vertical"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('eventModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveEvent()">Save Event</button>
    </div>
  </div>
</div>

<script src="/js/shell.js"></script>
<script>
  let allEvents = [];
  let calYear = new Date().getFullYear();
  let calMonth = new Date().getMonth();
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  async function loadCalendar() {
    await initShell('calendar');
    if (canEdit()) document.getElementById('addEventBtn').style.display = '';
    const res = await fetch('/api/events', { credentials: 'include' });
    allEvents = await res.json();
    renderCalendar();
    renderEventsList();
  }

  function changeMonth(dir) {
    calMonth += dir;
    if (calMonth > 11) { calMonth = 0; calYear++; }
    if (calMonth < 0) { calMonth = 11; calYear--; }
    renderCalendar();
  }

  function renderCalendar() {
    document.getElementById('calMonthLabel').textContent = `${MONTHS[calMonth]} ${calYear}`;
    const grid = document.getElementById('calendarGrid');
    const today = new Date();

    let html = DAYS.map(d => `<div class="calendar-header-day">${d}</div>`).join('');

    const first = new Date(calYear, calMonth, 1).getDay();
    const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
    const daysInPrev = new Date(calYear, calMonth, 0).getDate();

    for (let i = 0; i < first; i++) {
      const d = daysInPrev - first + i + 1;
      html += `<div class="calendar-day other-month"><div class="day-num">${d}</div></div>`;
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const dayEvents = allEvents.filter(e => e.date === dateStr);
      const isToday = today.getFullYear()===calYear && today.getMonth()===calMonth && today.getDate()===d;
      html += `<div class="calendar-day ${isToday?'today':''}">
        <div class="day-num">${d}</div>
        ${dayEvents.slice(0,2).map(e => `<div class="cal-event ${e.type}">${e.title}</div>`).join('')}
        ${dayEvents.length>2 ? `<div style="font-size:0.6rem;color:var(--text-muted)">+${dayEvents.length-2} more</div>` : ''}
      </div>`;
    }

    const remaining = 42 - first - daysInMonth;
    for (let d = 1; d <= remaining; d++) {
      html += `<div class="calendar-day other-month"><div class="day-num">${d}</div></div>`;
    }

    grid.innerHTML = html;
  }

  function renderEventsList() {
    const el = document.getElementById('eventsList');
    if (!allEvents.length) { el.innerHTML = `<div class="empty-state" style="padding:24px"><p>No events yet</p></div>`; return; }
    const sorted = [...allEvents].sort((a,b) => new Date(a.date) - new Date(b.date));
    el.innerHTML = sorted.map(e => `
      <div style="display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--grey-100)">
        <div style="width:42px;height:42px;background:var(--purple-100);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;border:1px solid var(--purple-200)">
          <span style="font-size:1rem;font-weight:700;color:var(--purple-700);font-family:'Playfair Display',serif;line-height:1">${new Date(e.date+'T00:00').getDate()}</span>
          <span style="font-size:0.58rem;font-weight:600;color:var(--purple-500);text-transform:uppercase">${new Date(e.date+'T00:00').toLocaleDateString('en-GB',{month:'short'})}</span>
        </div>
        <div style="flex:1">
          <div style="font-size:0.87rem;font-weight:600;color:var(--grey-800)">${e.title}</div>
          <div style="font-size:0.72rem;color:var(--text-secondary);margin-top:2px">${e.time||''} ${e.location?'· '+e.location:''}</div>
          <div style="display:flex;align-items:center;gap:6px;margin-top:5px">
            <span class="status-badge ${e.type==='client'?'status-pending':'status-in-progress'}">${e.type}</span>
          </div>
        </div>
        ${canEdit() ? `<div style="display:flex;gap:4px">
          <button class="btn btn-danger btn-sm btn-icon" onclick="deleteEvent('${e._id}')" title="Delete">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:13px;height:13px"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>
          </button>
        </div>` : ''}
      </div>
    `).join('');
  }

  async function saveEvent() {
    const title = document.getElementById('eventTitle').value.trim();
    const date = document.getElementById('eventDate').value;
    if (!title || !date) { showToast('Title and date are required', 'error'); return; }
    const payload = { title, date, time: document.getElementById('eventTime').value, type: document.getElementById('eventType').value, location: document.getElementById('eventLocation').value, description: document.getElementById('eventDesc').value };
    const res = await fetch('/api/events', { method: 'POST', headers: { 'Content-Type': 'application/json' }, credentials: 'include', body: JSON.stringify(payload) });
    if (!res.ok) { showToast('Failed to save event', 'error'); return; }
    const fresh = await fetch('/api/events', { credentials: 'include' });
    allEvents = await fresh.json();
    renderCalendar(); renderEventsList();
    closeModal('eventModal');
    ['eventTitle','eventDate','eventTime','eventLocation','eventDesc'].forEach(id => document.getElementById(id).value='');
    showToast('Event added', 'success');
  }

  async function deleteEvent(id) {
    if (!confirm('Delete this event?')) return;
    await fetch(`/api/events/${id}`, { method: 'DELETE', credentials: 'include' });
    allEvents = allEvents.filter(e => e._id !== id);
    renderCalendar(); renderEventsList();
    showToast('Event removed');
  }

  loadCalendar();
</script>
</body>
</html>
